<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Литературный Петербург 2026</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body class="day-theme">

    <header id="header">
        <div class="header-container">
            <div id="header-title">Литературный Петербург</div>
            <div id="world-selector">
                <button class="world-btn active" data-world="day">Быль ☀️</button>
                <button class="world-btn" data-world="night">Сказка 🌙</button>
            </div>
            <div style="width: 45px;"></div> <!-- для центровки селектора -->
        </div>
    </header>

    <main id="main-content">
        <div id="map"></div>
    </main>

    <footer id="footer">
        <div class="footer-content">
            <p>Выпускная квалификационная работа бакалавриата</p>
            <p>Картографирование историко-культурного наследия: Литературный Петербург</p>
            <p>Выполнил: Муханин Евгений Андреевич, 2026</p>
        </div>
    </footer>

    <script src="setup.js"></script>
    <script src="custom_day_map.js"></script>
    <script src="custom_night_map.js"></script>
    <script src="script.js"></script>
</body>
</html>
