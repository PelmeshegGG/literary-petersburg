<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Литературный Петербург 2026</title>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body class="day-theme">
    <header id="header">
        <div class="header-container">
            <div id="header-title">Литературный Петербург</div>
            <div id="world-selector">
                <span class="world-label">Быль</span>
                <div class="world-btns-group">
                    <button class="world-btn active" data-world="day">☀️</button>
                    <button class="world-btn" data-world="night">🌙</button>
                </div>
                <span class="world-label">Сказка</span>
            </div>
            <div style="width: 200px;"></div>
        </div>
    </header>

    <main id="main-content">
        <div id="map"></div>
        <button id="info-btn">i</button>
        <div id="ui-overlay">
            <div id="time-slider-container">
                <div class="slider-label">Период: <span id="year-label">1700 — 2026</span></div>
                <div class="dual-range-container">
                    <input type="range" id="year-min" min="1700" max="2026" value="1700">
                    <input type="range" id="year-max" min="1700" max="2026" value="2026">
                </div>
                <div class="filter-group">
                    <label>Личность:</label>
                    <select id="filter-person"><option value="all">Все</option></select>
                </div>
                <div class="filter-group">
                    <label>Тип объекта:</label>
                    <select id="filter-type">
                        <option value="all">Все</option>
                        <option value="памятник">Памятники</option>
                        <option value="доска">Мемориальные доски</option>
                    </select>
                </div>
            </div>
        </div>
        <div id="sidebar" class="hidden">
            <button id="close-sidebar">×</button>
            <div id="sidebar-content"></div>
        </div>
    </main>

    <!-- ПОРЯДОК ЗАГРУЗКИ СКРИПТОВ (НЕ МЕНЯТЬ) -->
    <script src="setup.js"></script>             <!-- 1. Сначала ключ и функции -->
    <script src="custom_day_map.js"></script>    <!-- 2. Потом стиль Дня -->
    <script src="custom_night_map.js"></script>  <!-- 3. Потом стиль Ночи -->
    <script src="script.js"></script>             <!-- 4. И в конце логика -->
</body>
</html>
