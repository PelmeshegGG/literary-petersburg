name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]       # замените на вашу основную ветку (master, gh-pages и т.п.)

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject MapTiler key
        run: |
          find . -type f -name "*.js" -exec sed -i "s/MAPTILER_LIVE_TOKEN/${{ secrets.MAPBOX_KEY }}/g" {} \;

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4